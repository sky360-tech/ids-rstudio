name: Daily IDS Commit

on:
  schedule:
    - cron: '0 15 * * *'
  workflow_dispatch:

jobs:
  commit:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Commit next files
        run: |
          git config user.email "tahmirhasanraid1@gmail.com"
          git config user.name "ASM Tahmir Hasan"

          INDEX_FILE=".github/commit_index.txt"
          INDEX=0
          if [ -f "$INDEX_FILE" ]; then
            INDEX=$(cat "$INDEX_FILE")
          fi

          FILES=($(find . -type f \( -name "*.R" -o -name "*.r" -o -name "*.csv" \) | grep -v ".github" | sort))
          TOTAL=${#FILES[@]}

          for i in {1..9}; do
            CURRENT=$((( INDEX + i - 1) % TOTAL))
            FILE="${FILES[$CURRENT]}"
            touch "$FILE"
            git add "$FILE"
            git commit -m "Review: $(basename $FILE) - $(date +'%Y-%m-%d') [$i/9]"
          done

          echo $((( INDEX + 9) % TOTAL)) > "$INDEX_FILE"
          git add "$INDEX_FILE"
          git commit -m "Update index - $(date +'%Y-%m-%d')"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}